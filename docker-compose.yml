services:
  feeds:
    build: .
    image: ghcr.io/greg-hass/feeds:latest
    restart: unless-stopped
    ports:
      - "${FEEDS_PORT:-3080}:80"
    volumes:
      - feeds_data:/data
    env_file:
      - path: .env
        required: false
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - APP_PASSWORD=${APP_PASSWORD}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DAILY_DIGEST_AI_PROVIDER=${DAILY_DIGEST_AI_PROVIDER:-gemini}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/api/v1/auth/status",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  feeds_data:
    driver: local
